services:
  db:
    image: postgres:16-alpine
    volumes:
      - db_data:/var/lib/postgresql/data/pgdata
    environment:
      PGDATA: ${PGDATA}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      retries: 20
      timeout: 3s

  app:
    image: ghcr.io/hannesmnagel/superghost-backend:latest
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-tencent/hy3-preview}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-12000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODERATION_MODEL: ${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-com.nagel.superghost}
      BOT_FILL_MS: ${BOT_FILL_MS:-5000}
      TURN_TIMEOUT_MS: ${TURN_TIMEOUT_MS:-30000}
      RECONNECT_GRACE_MS: ${RECONNECT_GRACE_MS:-60000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8080"
    restart: always

volumes:
  db_data:
