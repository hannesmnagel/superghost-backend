<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join Superghost Game</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #0f0f1a; color: white;
         display: flex; flex-direction: column; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
  h1 { font-size: 2em; margin-bottom: 0.5em; }
  p { color: #aaa; margin-bottom: 2em; }
  .btn { background: #6c5ce7; color: white; border: none; padding: 16px 32px;
         border-radius: 50px; font-size: 1.1em; cursor: pointer; text-decoration: none;
         display: inline-block; }
  .btn:hover { background: #7d6ff0; }
  .code { font-family: monospace; font-size: 2em; letter-spacing: 0.3em;
          background: rgba(255,255,255,0.1); padding: 12px 24px; border-radius: 12px;
          margin: 1em 0; }
</style>
</head>
<body>
<h1>👻 Superghost</h1>
<p>You've been invited to play!</p>
<div class="code" id="code"></div>
<a class="btn" id="appLink" href="#">Open in Superghost App</a>
<p style="margin-top:2em; font-size:0.85em;">
  Don't have the app? <a href="https://apps.apple.com/app/superghost" style="color:#6c5ce7">Download on the App Store</a>
</p>
<script>
  const code = window.location.pathname.split('/').pop() || ''
  document.getElementById('code').textContent = code
  document.getElementById('appLink').href = `superghost://join?code=${code}`
</script>
</body>
</html>
